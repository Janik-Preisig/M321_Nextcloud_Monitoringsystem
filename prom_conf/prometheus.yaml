global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]

  # Docker- und Nextcloud-Container-Ressourcen.
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  # CPU, RAM, Datenträger und Netzwerk des Docker-Hosts.
  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: mariadb
    static_configs:
      - targets: [mariadb-exporter:9104]
